name: Prepare Portable Python

on:
  workflow_dispatch:

concurrency:
  group: prepare-portable-python
  cancel-in-progress: false

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build portable Python environment
        shell: pwsh
        run: .\Install.ps1

      - name: Create 7z archive
        id: bundle
        shell: pwsh
        run: |
          .\Setup\Bundle.ps1
          $archive = Get-Item portable_python-*.7z | Select-Object -First 1
          "archive=$($archive.Name)" >> $env:GITHUB_OUTPUT

      - name: Set up Python for HuggingFace CLI
        uses: actions/setup-python@v5
        with:
          python-version: "3.13.12"

      - name: Upload to HuggingFace Hub
        shell: pwsh
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_REPO: ${{ vars.HF_PORTABLE_PYTHON_REPO }}
          ARCHIVE: ${{ steps.bundle.outputs.archive }}
        run: |
          pip install huggingface-hub
          huggingface-cli upload $env:HF_REPO $env:ARCHIVE --repo-type model

      - name: Upload artifact as backup
        uses: actions/upload-artifact@v4
        with:
          name: portable-python
          path: portable_python-*.7z
          retention-days: 30
